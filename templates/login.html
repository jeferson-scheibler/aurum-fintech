<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aurum Fintech — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold:        #C9A84C;
      --gold-light:  #E8C97A;
      --gold-dim:    #7a6228;
      --bg:          #0B0B0E;
      --surface:     #111116;
      --border:      #2a2820;
      --text:        #E8E2D0;
      --muted:       #6b6550;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      overflow: hidden;
      position: relative;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.4;
      pointer-events: none;
    }

    /* Gold glow orb */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      width: 380px;
      padding: 48px 40px 40px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Top gold accent bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-symbol {
      display: inline-block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      font-weight: 300;
      color: var(--gold);
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .logo-name {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .logo-sub {
      display: block;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--gold-dim);
      margin: 0 auto 32px;
    }

    label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }

    input:focus {
      border-color: var(--gold-dim);
    }

    button {
      width: 100%;
      padding: 13px;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      margin-top: 4px;
    }

    button:hover {
      background: var(--gold);
      color: var(--bg);
    }

    .erro {
      background: rgba(180, 60, 60, 0.12);
      border: 1px solid rgba(180, 60, 60, 0.35);
      color: #c97a7a;
      font-size: 11px;
      padding: 10px 12px;
      margin-bottom: 20px;
      letter-spacing: 0.05em;
    }

    .footer-text {
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.15em;
      margin-top: 28px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-symbol">₳</span>
      <span class="logo-name">Aurum</span>
      <span class="logo-sub">Fintech · Gestão Financeira</span>
    </div>
    <div class="divider"></div>

    {% if erro %}
    <div class="erro">{{ erro }}</div>
    {% endif %}

    <form method="POST">
      <label for="login">Usuário</label>
      <input type="text" id="login" name="login" placeholder="seu login" required autocomplete="off"/>

      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" placeholder="••••••••" required/>

      <button type="submit">Acessar</button>
    </form>

    <p class="footer-text">Acesso restrito a usuários cadastrados</p>
  </div>
</body>
</html>
