name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       financas_db
          POSTGRES_USER:     fintech
          POSTGRES_PASSWORD: ${{ secrets.DB_PASS }}
        options: >-
          --health-cmd "pg_isready -U fintech -d financas_db"
          --health-interval 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Aplicar migrations
        env:
          FLYWAY_PASSWORD: ${{ secrets.DB_PASS }}
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}/migrations:/flyway/sql \
            -e FLYWAY_URL=jdbc:postgresql://localhost:5432/financas_db \
            -e FLYWAY_USER=fintech \
            -e FLYWAY_PASSWORD \
            flyway/flyway:10-alpine migrate

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check app.py test_app.py

      - name: Executar testes
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: financas_db
          DB_USER: fintech
          DB_PASS: ${{ secrets.DB_PASS }}
          SMTP_USUARIO: ${{ secrets.SMTP_USUARIO }}
          SMTP_SENHA: ${{ secrets.SMTP_SENHA }}
        run: |
          pytest test_app.py -v \
            --cov=app --cov-report=xml --cov-report=term \
            --html=relatorio-testes.html \
            --self-contained-html

      - name: Publicar relatório de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: relatorio-testes.html

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Quality Gate (falha se reprovado)
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t aurum-fintech:latest .
